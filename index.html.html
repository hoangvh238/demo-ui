document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

style=\"animation:xlr-blink 1.4s infinite;\">▌<\u002Fspan>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:12px; margin-bottom:40px;\">\n      <div style=\"width:10px; height:10px; border-radius:50%; background:#ED4C20;\"><\u002Fdiv>\n      <span style=\"font-size:14px; font-weight:700; letter-spacing:4px; color:#65697A;\">WHO WE ARE<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Headline: \"problems\" bị xô lệch — Von Restorff -->\n    <h1 data-reveal=\"\" style=\"margin:0; font-weight:600; font-size:clamp(54px, 6.8vw, 104px); line-height:1.0; letter-spacing:-0.03em; max-width:1100px;\">\n      We've lived the<br>\n      <span style=\"display:inline-block; background:#ED4C20; color:#fff; padding:0 22px 8px; border-radius:16px 16px 16px 0; transform:rotate(-2deg); margin:6px 0;\">problems<\u002Fspan><br>\n      we now solve.\n    <\u002Fh1>\n\n    <div data-reveal=\"\" style=\"display:flex; gap:56px; margin-top:64px; align-items:flex-start; max-width:1100px;\">\n      <div style=\"flex-shrink:0; position:relative;\">\n        <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:150px; line-height:0.8; color:transparent; -webkit-text-stroke:2px #2B2D3A;\">2017<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0; font-size:19px; line-height:1.7; color:#4B4F5E; max-width:580px;\">\n        Our experience was grounded inside complex organisations — relying on enterprise systems in daily activity and confronting the limitations those systems created. We didn't build Exceleris to implement software; <strong style=\"color:#2B2D3A;\">we built it to solve the practical business problems that software often ignores.<\u002Fstrong>\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:14px; margin-top:70px; color:#8E98A8; font-size:13px; font-weight:600; letter-spacing:2px;\">\n      <div style=\"width:45px; height:45px; border-radius:50%; box-shadow:inset 0 0 0 1.5px #2B2D3A; display:flex; align-items:center; justify-content:center; font-size:18px;\">↓<\u002Fdiv>\n      SCROLL: FROM REACTIVE TO PROACTIVE\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════ 01 · FRUSTRATION — vùng cam, lưới cố tình xô lệch ═════ -->\n  <section style=\"background:#fff; padding:110px 120px; position:relative;\">\n    <div style=\"max-width:1360px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:flex-end; gap:36px; margin-bottom:24px;\">\n        <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:150px; line-height:0.78; color:#ED4C20;\">01<\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-weight:700; letter-spacing:4px; color:#ED4C20; margin-bottom:12px;\">REACTIVE — WHERE WE COME FROM<\u002Fdiv>\n          <h2 style=\"margin:0; font-weight:600; font-size:52px; line-height:1.02; letter-spacing:-0.02em;\">The Practitioner's Frustration<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p data-reveal=\"\" style=\"margin:0 0 20px 186px; font-size:18px; line-height:1.7; color:#4B4F5E; max-width:660px;\">\n        Before Exceleris, our team worked at the intersection of finance, operations, and technology. Across every organisation, we saw the same systemic failures appear repeatedly:\n      <\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:28px; margin-top:36px;\">\n        <div data-reveal=\"\" style=\"background:#2B2D3A; border-radius:28px 28px 28px 0; padding:44px 36px 48px; color:#fff; min-height:380px; display:flex; flex-direction:column; gap:18px; transform:rotate(-2deg); transition:transform .35s ease;\" style-hover=\"transform:rotate(0deg) translateY(-6px);\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n            <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:700; font-size:55px; color:#ED4C20; line-height:1;\">A<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9B9EB3;\">cost: hours / day<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:3px; color:#9B9EB3;\">SYSTEMIC FAILURE<\u002Fdiv>\n          <h3 style=\"margin:0; font-weight:600; font-size:30px; line-height:1.1;\">The Complexity Tax<\u002Fh3>\n          <p style=\"margin:0; font-size:16px; line-height:1.65; color:#C0C7D4;\">Operational reporting required continual, exhausting manual intervention because the underlying data was almost always out of date.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#ED4C20; border-radius:28px 28px 0 28px; padding:44px 36px 48px; color:#fff; min-height:380px; display:flex; flex-direction:column; gap:18px; transform:rotate(1.5deg) translateY(18px); transition:transform .35s ease;\" style-hover=\"transform:rotate(0deg) translateY(12px);\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n            <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:700; font-size:55px; color:#2B2D3A; line-height:1;\">B<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(255,255,255,0.7);\">cost: confidence<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,0.7);\">SYSTEMIC FAILURE<\u002Fdiv>\n          <h3 style=\"margin:0; font-weight:600; font-size:30px; line-height:1.1;\">The Trust Gap<\u002Fh3>\n          <p style=\"margin:0; font-size:16px; line-height:1.65; color:rgba(255,255,255,0.9);\">Data quality relied on heroic levels of manual spreadsheet reconciliation rather than true systemic integrity.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#2B2D3A; border-radius:0 28px 28px 28px; padding:44px 36px 48px; color:#fff; min-height:380px; display:flex; flex-direction:column; gap:18px; transform:rotate(-1deg); transition:transform .35s ease;\" style-hover=\"transform:rotate(0deg) translateY(-6px);\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n            <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:700; font-size:55px; color:#ED4C20; line-height:1;\">C<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9B9EB3;\">cost: visibility<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:3px; color:#9B9EB3;\">SYSTEMIC FAILURE<\u002Fdiv>\n          <h3 style=\"margin:0; font-weight:600; font-size:30px; line-height:1.1;\">The Fragmented Reality<\u002Fh3>\n          <p style=\"margin:0; font-size:16px; line-height:1.65; color:#C0C7D4;\">CRM, ERP, and financial systems operated as isolated islands — the \"real\" business happening in the unmonitored gaps between them.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════ THE SHIFT — bản lề cam→lục, DNA từ Reactive/Proactive Cycle của homepage ═════ -->\n  <section style=\"position:relative; display:grid; grid-template-columns:1fr 1fr; min-height:560px; overflow:hidden;\">\n    <div style=\"background:linear-gradient(135deg, #ED4C20 0%, #C3350F 100%); padding:90px 100px 90px 120px; color:#fff; display:flex; flex-direction:column; justify-content:center; gap:20px;\">\n      <div style=\"font-size:13px; font-weight:700; letter-spacing:4px; color:rgba(255,255,255,0.75);\">REACTIVE CYCLE<\u002Fdiv>\n      <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:64px; line-height:0.92;\">RECORDING<br>THE PAST<\u002Fdiv>\n      <p style=\"margin:0; font-size:17px; line-height:1.65; color:rgba(255,255,255,0.9); max-width:420px;\">Most enterprise systems were designed to record legacy processes <strong>after the fact<\u002Fstrong> — a historical ledger of what already happened.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(135deg, #2D8C3A 0%, #206329 100%); padding:90px 120px 90px 100px; color:#fff; display:flex; flex-direction:column; justify-content:center; gap:20px; align-items:flex-end; text-align:right;\">\n      <div style=\"font-size:13px; font-weight:700; letter-spacing:4px; color:rgba(255,255,255,0.75);\">PROACTIVE CYCLE<\u002Fdiv>\n      <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:64px; line-height:0.92;\">DRIVING<br>EXECUTION<\u002Fdiv>\n      <p style=\"margin:0; font-size:17px; line-height:1.65; color:rgba(255,255,255,0.9); max-width:420px;\">The real problem was an <strong>architectural disconnect<\u002Fstrong>. Systems must drive real-time business execution — not describe it later.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:170px; height:170px; border-radius:50%; background:#2B2D3A; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; box-shadow:0 10px 50px rgba(0,0,0,0.45); z-index:2;\">\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:3px; color:#9B9EB3;\">02 · THE<\u002Fdiv>\n      <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:40px; line-height:1;\">SHIFT<\u002Fdiv>\n      <div style=\"font-size:12px; color:#7BC287; font-weight:600;\">2017 → today<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute; left:50%; top:0; bottom:0; width:2px; background:rgba(255,255,255,0.35); transform:translateX(-50%);\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════ 03 · XLRS CLOUD — vùng lục: trật tự tuyệt đối ═════ -->\n  <section style=\"background:#F0F0F0; padding:110px 120px;\">\n    <div style=\"max-width:1360px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:flex-end; gap:36px; margin-bottom:24px;\">\n        <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:150px; line-height:0.78; color:#2D8C3A;\">03<\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-weight:700; letter-spacing:4px; color:#2D8C3A; margin-bottom:12px;\">PROACTIVE — WHAT WE BUILT<\u002Fdiv>\n          <h2 style=\"margin:0; font-weight:600; font-size:52px; line-height:1.02; letter-spacing:-0.02em;\">The Birth of XLRS Cloud<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p data-reveal=\"\" style=\"margin:0 0 20px 186px; font-size:18px; line-height:1.7; color:#4B4F5E; max-width:660px;\">\n        Practical solutions born in the operational trenches — from solving specific operational problems on the ground:\n      <\u002Fp>\n\n      <div style=\"display:flex; flex-direction:column; margin-top:36px;\">\n        <sc-for list=\"{{ shifts }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div data-reveal=\"\" style=\"display:grid; grid-template-columns:1fr 120px 1.2fr; align-items:center; gap:24px; padding:44px 40px; background:#fff; border-radius:20px; margin-bottom:16px;\" style-hover=\"box-shadow:0 12px 40px rgba(43,45,58,0.12); transition:box-shadow .3s ease;\">\n            <div>\n              <div style=\"font-size:12px; font-weight:700; letter-spacing:3px; color:#8E98A8; margin-bottom:10px;\">FROM<\u002Fdiv>\n              <div style=\"font-weight:500; font-size:28px; color:#9B9EB3; text-decoration:line-through; text-decoration-color:#ED4C20; text-decoration-thickness:2.5px;\">{{ s.from }}<\u002Fdiv>\n              <div style=\"font-size:15px; color:#8E98A8; margin-top:8px;\">{{ s.fromSub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:center;\">\n              <div style=\"width:64px; height:64px; border-radius:50%; background:#2D8C3A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px;\">→<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:12px; font-weight:700; letter-spacing:3px; color:#2D8C3A; margin-bottom:10px;\">TO<\u002Fdiv>\n              <div style=\"font-weight:600; font-size:34px; color:#2B2D3A;\">{{ s.to }}<\u002Fdiv>\n              <div style=\"font-size:15px; color:#4B4F5E; margin-top:8px;\">{{ s.toSub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"margin-top:56px; background:#2D8C3A; border-radius:28px; padding:56px 64px; display:flex; align-items:center; gap:48px; color:#fff;\">\n        <div style=\"font-family:'Big Shoulders',sans-serif; font-weight:800; font-size:64px; line-height:0.9; flex-shrink:0;\">XLRS<br>CLOUD<\u002Fdiv>\n        <p style=\"margin:0; font-size:19px; line-height:1.65; color:rgba(255,255,255,0.92); border-left:1px solid rgba(255,255,255,0.35); padding-left:48px;\">\n          These capabilities converged into <strong>XLRS Cloud<\u002Fstrong> — the orchestration engine that powers our structural solutions and supercharges your existing software environment.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════ 04 · COMMITMENT — peak-end ═════ -->\n  <section style=\"background:#2B2D3A; padding:130px 120px 110px; position:relative; overflow:hidden;\">\n    <div style=\"position:absolute; right:-140px; top:-140px; width:460px; height:460px; border-radius:50%; border:1px solid rgba(255,255,255,0.1);\"><\u002Fdiv>\n    <div style=\"position:absolute; right:-40px; top:-40px; width:260px; height:260px; border-radius:50%; border:1px solid rgba(255,255,255,0.1);\"><\u002Fdiv>\n    <div style=\"max-width:1180px; margin:0 auto; text-align:center; position:relative;\">\n      <div data-reveal=\"\" style=\"font-size:13px; font-weight:700; letter-spacing:4px; color:#8E98A8; margin-bottom:28px;\">04 · OUR PRACTICAL COMMITMENT<\u002Fdiv>\n      <h2 data-reveal=\"\" style=\"margin:0 auto; font-weight:600; font-size:clamp(40px, 4.8vw, 68px); line-height:1.06; letter-spacing:-0.02em; color:#fff; max-width:980px;\">\n        Structural clarity,<br>not <span style=\"color:transparent; -webkit-text-stroke:1.5px #7BC287;\">technological novelty.<\u002Fspan>\n      <\u002Fh2>\n      <p data-reveal=\"\" style=\"margin:36px auto 0; font-size:18px; line-height:1.7; color:#C0C7D4; max-width:720px;\">\n        We do not advocate for wholesale, high-risk system replacement where incremental architectural improvement can deliver better outcomes. Our objective is to strengthen and elevate the environment you already operate.\n      <\u002Fp>\n\n      <div data-reveal=\"\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:64px; text-align:left;\">\n        <div style=\"background:#2D8C3A; border-radius:24px; padding:44px 40px; color:#fff; display:flex; flex-direction:column; gap:16px; min-height:220px;\">\n          <h3 style=\"margin:0; font-weight:600; font-size:30px; line-height:1.15;\">Practitioners.<br>Not theorists.<\u002Fh3>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.6; color:rgba(255,255,255,0.85); max-width:380px;\">We walk in with the practical experience required to align leadership intent with operational reality.<\u002Fp>\n          <div style=\"margin-top:auto; align-self:flex-start; background:#fff; color:#2D8C3A; border-radius:50px; padding:12px 26px; font-weight:600; font-size:15px; cursor:pointer;\" style-hover=\"transform:scale(1.04); transition:transform .2s;\">Speak with a Practitioner →<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#ED4C20; border-radius:24px; padding:44px 40px; color:#fff; display:flex; flex-direction:column; gap:16px; min-height:220px;\">\n          <h3 style=\"margin:0; font-weight:600; font-size:30px; line-height:1.15;\">Your infrastructure,<br>as a strategic vehicle.<\u002Fh3>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.6; color:rgba(255,255,255,0.9); max-width:380px;\">Ensure your information infrastructure serves as a strategic vehicle to run your business.<\u002Fp>\n          <div style=\"margin-top:auto; align-self:flex-start; background:#fff; color:#ED4C20; border-radius:50px; padding:12px 26px; font-weight:600; font-size:15px; cursor:pointer;\" style-hover=\"transform:scale(1.04); transition:transform .2s;\">Book Consultation →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════ FOOTER ═════ -->\n  <footer style=\"background:#2B2D3A; border-top:1px solid rgba(255,255,255,0.12); padding:36px 120px; display:flex; align-items:center; justify-content:space-between; color:#9B9EB3; font-size:14px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <img src=\"1baace58-3d47-435d-8cf2-98d61fb96354\" alt=\"Exceleris\" style=\"width:32px; height:36px; object-fit:contain; filter:brightness(0) invert(1);\">\n      <span style=\"font-weight:600; letter-spacing:3px; color:#fff;\">EXCELERIS CONSULTING<\u002Fspan>\n    <\u002Fdiv>\n    <span>© 2026 Exceleris Consulting · Since 2017<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1600, &quot;height&quot;: 900 }\n}\">\nclass Component extends DCLogic {\n  spineFill = React.createRef();\n  spineBadge = React.createRef();\n\n  renderVals() {\n    return {\n      spineFill: this.spineFill,\n      spineBadge: this.spineBadge,\n      shifts: [\n        { from: \"Forecasting\", fromSub: \"Manual cash flow reconstruction\", to: \"Insight\", toSub: \"Real-time forward visibility\" },\n        { from: \"Documents\", fromSub: \"Manual data entry\", to: \"Intelligence\", toSub: \"Autonomous, AI-driven ingestion\" },\n        { from: \"Maintenance\", fromSub: \"Static, historical records\", to: \"Orchestration\", toSub: \"Live, synchronised transactions\" },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    // spine progress — goal-gradient effect\n    this._onScroll = () => {\n      const doc = document.documentElement;\n      const max = doc.scrollHeight - window.innerHeight;\n      const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;\n      const pct = Math.round(p * 100);\n      if (this.spineFill.current) this.spineFill.current.style.height = pct + \"%\";\n      if (this.spineBadge.current) {\n        const b = this.spineBadge.current;\n        b.style.top = pct + \"%\";\n        b.textContent = pct + \"%\";\n        b.style.background = p < 0.5 ? \"#ED4C20\" : \"#2D8C3A\";\n      }\n    };\n    window.addEventListener(\"scroll\", this._onScroll, { passive: true });\n    this._onScroll();\n\n    // scroll reveal\n    const els = document.querySelectorAll(\"[data-reveal]\");\n    if (\"IntersectionObserver\" in window) {\n      els.forEach((el) => { el.style.opacity = \"0\"; });\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.animation = \"xlr-rise .8s cubic-bezier(.22,1,.36,1) forwards\";\n            this._io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.12 });\n      els.forEach((el) => this._io.observe(el));\n    }\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"scroll\", this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
